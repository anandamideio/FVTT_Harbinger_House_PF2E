<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Crossed swords -->
  <!-- Sword 1 (left to right) -->
  <line x1="8" y1="40" x2="40" y2="8" stroke="#44dd44" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M38 6 L42 6 L42 10" fill="none" stroke="#44dd44" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Sword 2 (right to left) -->
  <line x1="40" y1="40" x2="8" y2="8" stroke="#44dd44" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M6 6 L10 6 L6 10" fill="none" stroke="#44dd44" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center shield -->
  <circle cx="24" cy="24" r="6" fill="#2a8a2a" stroke="#44dd44" stroke-width="1"/>
  <!-- Exclamation mark -->
  <rect x="23" y="19" width="2" height="6" rx="1" fill="#ffffff"/>
  <circle cx="24" cy="28" r="1" fill="#ffffff"/>
</svg>
